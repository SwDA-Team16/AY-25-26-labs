apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: mzinga-lab4
  labels:
    app: webapp
spec:
  replicas: 3
  selector:

    # [Lab 4 - Step 2.1] Deployment selector must match Pod labels
    matchLabels:
      app: webapp

  # [Lab 4 - Step 4.2] Recreate stops all Pods before starting new ones
  strategy:
    type: Recreate      # all old Pods terminate before any new Pod starts
  template:
    metadata:
      labels:
        app: webapp
        version: v1
    spec:
      containers:
        - name: webapp
          image: mzinga-webapp:1.0.0

          # [Lab 4 - Step 2.1] Use local images loaded into minikube
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: APP_COLOR
              value: "blue"

          # [Lab 4 - Step 2.1] Readiness and liveness probes use /health
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
