apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: mzinga-lab4
spec:

  # [Lab 4 - Step 6.2] Omitting track sends traffic to both versions
  selector:
    app: webapp      # intentionally omits "track" — matches both stable and canary pods
  ports:
    - port: 80
      targetPort: 8080
